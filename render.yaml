services:
  - type: web
    name: lura-api
    env: python
    buildCommand: "pip install -r requirements.txt && pip install yt-dlp"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    nativeEnvironments:
      - FFMPEG_BINARY=ffmpeg
